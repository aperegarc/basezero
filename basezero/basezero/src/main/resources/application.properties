spring.application.name=basezero

# Base de datos (sobreescribir con variables de entorno en despliegue)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/basezero}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

# JWT (Base64; mínimo 256 bits decodificados para HS256)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# CORS: orígenes extra separados por coma (además de localhost en desarrollo)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# Seed de desarrollo: empresa + admin (login con email = app.seed.dev-admin.email)
app.seed.dev-admin.enabled=${APP_SEED_DEV_ADMIN_ENABLED:true}
app.seed.dev-admin.email=${APP_SEED_DEV_ADMIN_EMAIL:admin}
app.seed.dev-admin.password=${APP_SEED_DEV_ADMIN_PASSWORD:admin123}

# Flyway: migraciones incrementales; el esquema inicial lo crea Hibernate en local
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# OpenAPI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
